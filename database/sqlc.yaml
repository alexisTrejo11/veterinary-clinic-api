version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries/"
    schema: "./migrations/"
    gen:
      go:
        package: "sqlc"
        out: "sqlc"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "person_gender"
            go_type: "clinic-vet-api/database/models.PersonGender"
          - db_type: "veterinarian_speciality"
            go_type: "clinic-vet-api/database/models.VeterinarianSpeciality"
          - db_type: "user_status"
            go_type: "clinic-vet-api/database/models.UserStatus"
          - db_type: "user_role"
            go_type: "clinic-vet-api/database/models.UserRole"
          - db_type: "currency"
            go_type: "clinic-vet-api/database/models.Currency"
          - db_type: "payment_status"
            go_type: "clinic-vet-api/database/models.PaymentStatus"
          - db_type: "payment_method"
            go_type: "clinic-vet-api/database/models.PaymentMethod"
          - column: "appointments.clinic_service"
            go_type: "clinic-vet-api/database/models.ClinicService"
          - column: "medical_sessions.clinic_service"
            go_type: "clinic-vet-api/database/models.ClinicService"
          - db_type: "appointment_status"
            go_type: "clinic-vet-api/database/models.AppointmentStatus"
