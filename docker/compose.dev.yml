# Dev profile: API only — set DATABASE_URL and REDIS_URL in ../.env (cloud or shared dev)
name: vet-clinic-dev

services:
  api:
    container_name: clinical_vet_api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${SERVER_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      SERVER_PORT: "8000"
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-true}
      SKIP_DB_WAIT: ${SKIP_DB_WAIT:-true}
