# Build → test → publish to GHCR → deploy over Cloudflare Access SSH.
#
# Required repository secrets:
#   SSH_HOST              Cloudflare Access SSH hostname
#   SSH_USER              SSH user on the remote host
#   SSH_PRIVATE_KEY       Private key for that user
#   CF_CLIENT_ID          Cloudflare Access service token client id
#   CF_CLIENT_SECRET      Cloudflare Access service token client secret
#   GHCR_TOKEN            PAT (or fine-grained token) with read:packages
#   DEPLOY_PATH           Remote deploy directory (e.g. ~/homelab/deploys/servers/veterinary-clinic)
#
# Optional:
#   GHCR_USER             GHCR username (defaults to github.repository_owner)

name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.24.0"

jobs:
  # ---------------------------------------------------------------------------
  # CI — build and test on every PR and push to main
  # ---------------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -o /dev/null ./cmd/api

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  # ---------------------------------------------------------------------------
  # Publish — build and push Docker image to GHCR (main only)
  # ---------------------------------------------------------------------------
  publish:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Image metadata
        id: meta
        run: |
          IMAGE="$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          TAG="${{ github.sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — SSH via Cloudflare Access, pull image, refresh service
  # ---------------------------------------------------------------------------
  deploy:
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Configure SSH over Cloudflare Access
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Service Token auth must NOT go in ProxyCommand as --id/--secret:
          # cloudflared treats those as a listen address. Pass via CF_ACCESS_* env.
          {
            echo "Host deploy-host"
            echo "  HostName ${SSH_HOST}"
            echo "  User ${SSH_USER}"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  IdentitiesOnly yes"
            echo "  ProxyCommand cloudflared access ssh --hostname %h"
            echo "  StrictHostKeyChecking accept-new"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy via SSH (GHCR pull + restart)
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ${{ needs.publish.outputs.image }}
          IMAGE_TAG: ${{ needs.publish.outputs.tag }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "DEPLOY_PATH secret is required (remote directory with the Makefile)."
            exit 1
          fi

          GHCR_USER="${GHCR_USER:-${{ github.repository_owner }}}"

          # printf %q keeps tokens with special chars safe inside the remote shell.
          ssh deploy-host \
            "export GHCR_TOKEN=$(printf '%q' "$GHCR_TOKEN") \
                    GHCR_USER=$(printf '%q' "$GHCR_USER") \
                    IMAGE=$(printf '%q' "$IMAGE") \
                    IMAGE_TAG=$(printf '%q' "$IMAGE_TAG") \
                    DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH"); bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          # Expects a Makefile target that pulls IMAGE:IMAGE_TAG (or :latest) and restarts.
          make refresh IMAGE="$IMAGE" IMAGE_TAG="$IMAGE_TAG"

          # Safe cleanup: only unused images for THIS project (not host-wide prune).
          echo "Cleaning unused images for $IMAGE only..."
          docker images "$IMAGE" --format '{{.ID}}' | sort -u | while read -r id; do
            if [ -z "$(docker ps -aq --filter "ancestor=${id}")" ]; then
              docker rmi "$id" 2>/dev/null || true
            fi
          done

          docker logout ghcr.io || true
          echo "Deploy finished."
          REMOTE
