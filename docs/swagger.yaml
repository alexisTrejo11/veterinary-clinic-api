    get:
      consumes:
      - application/json
      description: Paginated search of all appointments with filters. Requires admin
        or manager role.
      parameters:
      - description: Search criteria and pagination
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentSearchRequest'
