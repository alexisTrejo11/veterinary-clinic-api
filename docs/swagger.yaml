basePath: /api/v2
definitions:
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.ActivateAccountRequest:
    description: User ID and activation code (e.g. from email link). Supports query
      params or JSON body.
    properties:
      code:
        maxLength: 32
        type: string
      user_id:
        maxLength: 20
        type: string
    required:
    - code
    - user_id
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentCreateRequest:
    description: Request body for creating a new appointment
    properties:
      customer_id:
        description: |-
          ID of the customer making the appointment
          Required: true
        example: 123
        type: integer
      notes:
        description: Additional notes for the appointment (optional)
        example: Patient has allergy to penicillin
        type: string
      pet_id:
        description: |-
          ID of the pet for the appointment
          Required: true
        example: 456
        type: integer
      reason:
        description: |-
          Reason for the appointment
          Required: true
        example: Annual checkup
        type: string
      scheduled_date:
        description: |-
          Date and time of the appointment
          Required: true
          Format: RFC3339
        example: "2024-03-15T10:30:00Z"
        type: string
      service:
        description: |-
          Service requested
          Required: true
        example: Vaccination
        type: string
      status:
        description: |-
          Status of the appointment
          Required: false (defaults to "scheduled")
        example: scheduled
        type: string
    required:
    - customer_id
    - pet_id
    - reason
    - scheduled_date
    - service
    - status
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentRequestByCustomerRequest:
    description: Pet ID, scheduled date/time, reason, service, optional notes. Customer
      ID is taken from auth.
    properties:
      notes:
        type: string
      pet_id:
        type: integer
      reason:
        type: string
      scheduled_date:
        type: string
      service:
        type: string
    required:
    - pet_id
    - reason
    - scheduled_date
    - service
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentResponse:
    description: 'Appointment entity: id, pet_id, customer_id, employee_id, service,
      datetime, status, reason, notes, timestamps.'
    properties:
      created_at:
        type: string
      customer_id:
        type: integer
      date_time:
        type: string
      id:
        type: integer
      notes:
        type: string
      pet_id:
        type: integer
      reason:
        type: string
      scheduled_date:
        type: string
      service:
        type: string
      status:
        type: string
      updated_at:
        type: string
      vet_id:
        type: integer
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentSearchRequest:
    description: Optional customer_id, vet_id, pet_id, service, status, reason, start_date,
      end_date, has_notes, plus pagination.
    properties:
      customer_id:
        minimum: 1
        type: integer
      end_date:
        type: string
      has_notes:
        type: boolean
      order_by:
        maxLength: 50
        type: string
      page:
        minimum: 1
        type: integer
      page_size:
        maximum: 100
        minimum: 1
        type: integer
      pet_id:
        minimum: 1
        type: integer
      reason:
        type: string
      service:
        type: string
      sort_direction:
        allOf:
        - $ref: '#/definitions/clinic-vet-api_internal_shared_page.SortDirection'
        enum:
        - ASC
        - DESC
      start_date:
        type: string
      status:
        type: string
      vet_id:
        minimum: 1
        type: integer
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentUpdateGeneralInfoRequest:
    description: Optional reason, notes, and service. Only provided fields are updated.
    properties:
      notes:
        description: 'Optional: Additional notes or observations about the appointment'
        example: Patient requires special handling
        maxLength: 1000
        type: string
      reason:
        description: 'Optional: Reason for updating the appointment'
        example: Updated reason for appointment
        maxLength: 500
        type: string
      service:
        description: 'Optional: Service type for the appointment (e.g., "checkup",
          "vaccination", "surgery")'
        example: Annual checkup
        maxLength: 100
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.CreateUserRequest:
    description: Request body for creating a new user account
    properties:
      email:
        description: |-
          Email address of the user
          Required: true
          Example: user@example.com``
        example: user@example.com
        type: string
      password:
        description: |-
          Plain text password (will be hashed)
          Required: true
          Minimum length: 8 characters
        example: SecurePass123!
        minLength: 8
        type: string
      phone_number:
        description: |-
          Phone number of the user
          Required: false
          Example: +1234567890
        example: "+1234567890"
        minLength: 10
        type: string
      profile:
        allOf:
        - $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.ProfileInfo'
        description: User profile information
      role:
        description: |-
          Role of the user (admin, veterinarian, customer, receptionist)
          Required: true
          Example: customer
        enum:
        - admin
        - veterinarian
        - customer
        - receptionist
        example: customer
        type: string
      status:
        description: |-
          Initial status of the user account
          Required: false (defaults to "pending")
          Example: active
        enum:
        - active
        - inactive
        - pending
        example: active
        type: string
    required:
    - email
    - password
    - role
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.CustomerCreateRequest:
    description: First name, last name, email, gender, date of birth, optional photo
      URL, is_active, and optional user_id to link account.
    properties:
      date_of_birth:
        type: string
      email:
        type: string
      first_name:
        type: string
      gender:
        enum:
        - male
        - female
        - not_specified
        - other
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      photo_url:
        type: string
      user_id:
        type: integer
    required:
    - date_of_birth
    - email
    - first_name
    - gender
    - last_name
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.CustomerResponse:
    description: 'Customer entity: id, name, gender, date of birth, photo, user_id,
      is_active, timestamps.'
    properties:
      created_at:
        type: string
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      photo_url:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.CustomerSearchRequest:
    description: Pagination plus optional search text and is_active filter.
    properties:
      is_active:
        description: Optional active filter.
        type: boolean
      order_by:
        maxLength: 50
        type: string
      page:
        minimum: 1
        type: integer
      page_size:
        maximum: 100
        minimum: 1
        type: integer
      search:
        description: Optional text search over first and last name.
        type: string
      sort_direction:
        allOf:
        - $ref: '#/definitions/clinic-vet-api_internal_shared_page.SortDirection'
        enum:
        - ASC
        - DESC
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.CustomerUpdateRequest:
    description: ID (required) plus optional fields to update. ID can also be taken
      from URL path.
    properties:
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        enum:
        - male
        - female
        - not_specified
        - other
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      photo_url:
        type: string
      user_id:
        type: integer
    required:
    - id
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.EmployeeCreateRequest:
    description: Name, gender, date of birth, photo, license number, years experience,
      specialty, schedule, optional is_active.
    properties:
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        enum:
        - male
        - female
        - not_specified
        - other
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      license_number:
        type: string
      photo:
        type: string
      schedule:
        $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.EmployeeScheduleRequest'
      specialty:
        type: string
      years_experience:
        maximum: 60
        minimum: 0
        type: integer
    required:
    - date_of_birth
    - first_name
    - gender
    - last_name
    - license_number
    - schedule
    - specialty
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.EmployeeResponse:
    description: 'Employee entity: id, name, gender, date of birth, photo, license,
      specialty, years experience, is_active, user_id, timestamps.'
    properties:
      created_at:
        type: string
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      license_number:
        type: string
      photo:
        type: string
      specialty:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
      years_experience:
        type: integer
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.EmployeeScheduleRequest:
    description: Day of week, entry/departure time (0-23), optional break window.
    properties:
      day:
        description: e.g. "monday"
        type: string
      departure_time:
        maximum: 23
        minimum: 0
        type: integer
      end_break:
        maximum: 23
        minimum: 0
        type: integer
      entry_time:
        description: 0-23
        maximum: 23
        minimum: 0
        type: integer
      start_break:
        maximum: 23
        minimum: 0
        type: integer
    required:
    - day
    - departure_time
    - entry_time
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.EmployeeSearchRequest:
    description: Pagination plus optional specialty and is_active filter.
    properties:
      is_active:
        type: boolean
      order_by:
        maxLength: 50
        type: string
      page:
        minimum: 1
        type: integer
      page_size:
        maximum: 100
        minimum: 1
        type: integer
      sort_direction:
        allOf:
        - $ref: '#/definitions/clinic-vet-api_internal_shared_page.SortDirection'
        enum:
        - ASC
        - DESC
      specialty:
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.EmployeeUpdateRequest:
    description: ID (required) plus optional fields and optional schedule.
    properties:
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        enum:
        - male
        - female
        - not_specified
        - other
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      license_number:
        type: string
      photo:
        type: string
      schedule:
        $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.EmployeeScheduleRequest'
      specialty:
        type: string
      years_experience:
        maximum: 60
        minimum: 0
        type: integer
    required:
    - id
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.EnableTwoFactorRequest:
    description: '2FA method: totp, sms, or email.'
    properties:
      method:
        enum:
        - totp
        - sms
        - email
        type: string
    required:
    - method
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.LoginRequest:
    description: Email, password, and optional two_factor_code when 2FA is enabled.
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 128
        type: string
      two_factor_code:
        maxLength: 16
        type: string
    required:
    - email
    - password
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.LogoutRequest:
    description: Refresh token to revoke for the current session.
    properties:
      refresh_token:
        maxLength: 2000
        type: string
    required:
    - refresh_token
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.NotificationResponse:
    description: 'Notification entity: id, user_id, user_email, user_phone, title,
      subject, message, type, channel, created_at.'
    properties:
      channel:
        description: Delivery channel (email, sms)
        example: email
        type: string
      created_at:
        description: Creation timestamp
        example: "2024-01-01T00:00:00Z"
        type: string
      id:
        description: Unique identifier of the notification
        example: 665f1c2ab3d4e5f6a7b8c9d0
        type: string
      message:
        description: Notification message body
        example: Don't forget your appointment at 10:00.
        type: string
      subject:
        description: Notification subject
        example: Your appointment is tomorrow
        type: string
      title:
        description: Notification title
        example: Appointment reminder
        type: string
      type:
        description: Notification type
        example: appointment_reminder
        type: string
      user_email:
        description: Target email (for email channel)
        example: user@example.com
        type: string
      user_id:
        description: ID of the target user (if any)
        example: "123"
        type: string
      user_phone:
        description: Target phone (for sms channel)
        example: "+1234567890"
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.PaymentResponse:
    description: 'Payment entity: id, amount, currency, status, method, transaction_id,
      description, due_date, paid_at, customer_id, timestamps, optional refund/delete
      info.'
    properties:
      amount:
        type: number
      created_at:
        type: string
      currency:
        type: string
      customer_id:
        type: integer
      deleted_at:
        type: string
      description:
        type: string
      due_date:
        type: string
      failure_reason:
        type: string
      id:
        type: integer
      invoice_id:
        type: string
      is_active:
        type: boolean
      method:
        type: string
      method_display:
        type: string
      paid_at:
        type: string
      refund_amount:
        type: number
      refunded_at:
        type: string
      status:
        type: string
      status_display:
        type: string
      transaction_id:
        type: string
      updated_at:
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.ProfileInfo:
    description: User profile details
    properties:
      bio:
        description: User biography (max 500 characters)
        example: Animal lover and pet owner
        maxLength: 500
        type: string
      date_of_birth:
        description: Date of birth
        example: "1990-01-15T00:00:00Z"
        type: string
      gender:
        description: Gender of the user
        example: male
        type: string
      name:
        description: Full name of the user
        example: John Doe
        type: string
      photo_url:
        description: URL to user's profile photo
        example: https://example.com/photo.jpg
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.ProfileResponse:
    description: 'Authenticated user''s profile: id, email, phone, role, status, name,
      gender, date of birth, profile picture URL, bio.'
    properties:
      bio:
        type: string
      date_of_birth:
        type: string
      email:
        type: string
      gender:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      profile_pic_url:
        type: string
      role:
        type: string
      status:
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.RefreshTokenRequest:
    description: Refresh token string to exchange for new access and refresh tokens.
    properties:
      refresh_token:
        maxLength: 2000
        type: string
    required:
    - refresh_token
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.RegisterRequest:
    description: 'Request body for user registration. Role: admin, veterinarian, customer,
      or receptionist. Admins get immediate access; others may require activation.'
    properties:
      bio:
        maxLength: 500
        type: string
      date_of_birth:
        maxLength: 20
        type: string
      email:
        example: user@example.com
        maxLength: 255
        type: string
      employee_id:
        type: integer
      gender:
        maxLength: 20
        type: string
      license_number:
        maxLength: 100
        type: string
      name:
        maxLength: 200
        type: string
      password:
        example: SecurePass123!
        maxLength: 128
        minLength: 8
        type: string
      phone_number:
        maxLength: 30
        type: string
      photo_url:
        maxLength: 500
        type: string
      role:
        enum:
        - admin
        - veterinarian
        - customer
        - receptionist
        example: customer
        type: string
    required:
    - email
    - password
    - role
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.RequestResetPasswordRequest:
    description: Email address to send the password reset link/code to.
    properties:
      email:
        maxLength: 255
        type: string
    required:
    - email
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.RescheduleAppointmentRequest:
    description: New date/time (RFC3339) and optional reason.
    properties:
      datetime:
        description: '@Required Required: New date and time for the appointment (RFC3339
          format)'
        example: "2024-01-15T10:30:00Z"
        type: string
      reason:
        description: 'Optional: Reason for rescheduling the appointment'
        example: Routine checkup
        maxLength: 500
        type: string
    required:
    - datetime
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.ResetPasswordRequest:
    description: Email, code received by email, and new password.
    properties:
      code:
        maxLength: 32
        type: string
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - code
    - email
    - password
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.SendNotificationRequest:
    description: Channel (email/sms), type, optional user_id, user_email (for email),
      user_phone (for sms), title, subject, message, optional token (e.g. reset link).
    properties:
      channel:
        description: email, sms
        type: string
      message:
        type: string
      subject:
        type: string
      title:
        type: string
      token:
        description: optional; e.g. for reset links
        type: string
      type:
        description: notification type
        type: string
      user_email:
        description: required for email
        type: string
      user_id:
        description: optional; for in-app targeting
        type: string
      user_phone:
        description: required for sms
        type: string
    required:
    - channel
    - message
    - subject
    - type
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.SessionResponse:
    description: Contains access token, refresh token, and minimal user info.
    properties:
      access_token:
        $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.TokenResponse'
      refresh_token:
        $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.TokenResponse'
      user:
        $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.UserAuthResponse'
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.TokenResponse:
    description: JWT token string, expiry time, and type (e.g. Bearer).
    properties:
      expires_at:
        type: string
      token:
        type: string
      type:
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.UpdateProfileRequest:
    description: Authenticated user's profile fields to update (name, gender, date
      of birth, photo URL, bio).
    properties:
      bio:
        maxLength: 500
        type: string
      date_of_birth:
        type: string
      gender:
        example: male
        type: string
      name:
        example: John Doe
        type: string
      photo_url:
        type: string
    required:
    - gender
    - name
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.UpdateUserStatusRequest:
    description: Request body for updating user account status
    properties:
      status:
        description: |-
          New status (active, inactive, banned)
          Required: true
        enum:
        - active
        - inactive
        - banned
        example: active
        type: string
    required:
    - status
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.UserAuthResponse:
    description: User identifier, email, and role returned in login/session payloads.
    properties:
      email:
        type: string
      id:
        type: integer
      role:
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.UserResponse:
    description: User account information (excluding sensitive data)
    properties:
      created_at:
        description: |-
          Account creation timestamp
          Example: 2024-01-01T00:00:00Z
        example: "2024-01-01T00:00:00Z"
        type: string
      customer_id:
        description: |-
          ID of the associated customer (for customer users)
          Example: 789
        example: 789
        type: integer
      email:
        description: |-
          Email address of the user
          Example: user@example.com
        example: user@example.com
        type: string
      email_verified:
        description: |-
          Whether the email has been verified
          Example: true
        example: true
        type: boolean
      employee_id:
        description: |-
          ID of the associated employee (for staff users)
          Example: 456
        example: 456
        type: integer
      id:
        description: |-
          Unique identifier for the user
          Example: 123
        example: 123
        type: integer
      last_login_at:
        description: |-
          Last login timestamp
          Example: 2024-03-10T15:30:00Z
        example: "2024-03-10T15:30:00Z"
        type: string
      oauth_provider:
        description: |-
          OAuth provider name (e.g., "google", "facebook")
          Example: google
        example: google
        type: string
      phone_number:
        description: |-
          Phone number of the user
          Example: +1234567890
        example: "+1234567890"
        type: string
      profile:
        allOf:
        - $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.ProfileResponse'
        description: User profile information
      role:
        description: |-
          Role of the user (admin, veterinarian, customer, receptionist)
          Example: customer
        example: customer
        type: string
      status:
        description: |-
          Status of the user account (active, inactive, banned, pending)
          Example: active
        example: active
        type: string
      two_factor_enabled:
        description: |-
          Whether two-factor authentication is enabled
          Example: false
        example: false
        type: boolean
      updated_at:
        description: |-
          Last update timestamp
          Example: 2024-03-10T15:30:00Z
        example: "2024-03-10T15:30:00Z"
        type: string
    type: object
  clinic-vet-api_internal_infrastructure_http_handlers_dtos.VerifyTwoFactorRequest:
    description: One-time 2FA code (TOTP or backup code).
    properties:
      two_factor_code:
        maxLength: 16
        type: string
    required:
    - two_factor_code
    type: object
  clinic-vet-api_internal_shared_http.APIResponse:
    description: Standardized API response structure.
    properties:
      data:
        description: The data payload of the response for successful requests.
