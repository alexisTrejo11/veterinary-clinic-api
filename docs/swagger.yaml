basePath: /api/v2
definitions:
  dtos.ActivateAccountRequest:
    description: User ID and activation code (e.g. from email link). Supports query
      params or JSON body.
    properties:
      code:
        maxLength: 32
        type: string
      user_id:
        maxLength: 20
        type: string
    required:
    - code
    - user_id
    type: object
  dtos.AppointmentRequestByCustomerRequest:
    description: Pet ID, scheduled date/time, reason, service, optional notes. Customer
      ID is taken from auth.
    properties:
      notes:
        type: string
      pet_id:
        type: integer
      reason:
        type: string
      scheduled_date:
        type: string
      service:
        type: string
    required:
    - pet_id
    - reason
    - scheduled_date
    - service
    type: object
  dtos.AppointmentSearchRequest:
    description: Optional customer_id, vet_id, pet_id, service, status, reason, start_date,
      end_date, has_notes, plus pagination.
    properties:
      customer_id:
        minimum: 1
        type: integer
      end_date:
        type: string
      has_notes:
        type: boolean
      order_by:
        maxLength: 50
        type: string
      page:
        minimum: 1
        type: integer
      page_size:
        maximum: 100
        minimum: 1
        type: integer
      pet_id:
        minimum: 1
        type: integer
      reason:
        type: string
      service:
        type: string
      sort_direction:
        allOf:
        - $ref: '#/definitions/page.SortDirection'
        enum:
        - ASC
        - DESC
      start_date:
        type: string
      status:
        type: string
      vet_id:
        minimum: 1
        type: integer
    type: object
  dtos.CreateUserRequest:
    description: Request body for creating a new user account
    properties:
      email:
        description: |-
          Email address of the user
          Required: true
          Example: user@example.com``
        example: user@example.com
        type: string
      password:
        description: |-
          Plain text password (will be hashed)
          Required: true
          Minimum length: 8 characters
        example: SecurePass123!
        minLength: 8
        type: string
      phone_number:
        description: |-
          Phone number of the user
          Required: false
          Example: +1234567890
        example: "+1234567890"
        minLength: 10
        type: string
      profile:
        allOf:
        - $ref: '#/definitions/dtos.ProfileInfo'
        description: User profile information
      role:
        description: |-
          Role of the user (admin, veterinarian, customer, receptionist)
          Required: true
          Example: customer
        enum:
        - admin
        - veterinarian
        - customer
        - receptionist
        example: customer
        type: string
      status:
        description: |-
          Initial status of the user account
          Required: false (defaults to "pending")
          Example: active
        enum:
        - active
        - inactive
        - pending
        example: active
        type: string
    required:
    - email
    - password
    - role
    type: object
  dtos.CustomerCreateRequest:
    description: First name, last name, email, gender, date of birth, optional photo
      URL, is_active, and optional user_id to link account.
    properties:
      date_of_birth:
        type: string
      email:
        type: string
      first_name:
        type: string
      gender:
        enum:
        - male
        - female
        - not_specified
        - other
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      photo_url:
        type: string
      user_id:
        type: integer
    required:
    - date_of_birth
    - email
    - first_name
    - gender
    - last_name
    type: object
  dtos.CustomerResponse:
    description: 'Customer entity: id, name, gender, date of birth, photo, user_id,
      is_active, timestamps.'
    properties:
      created_at:
        type: string
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      photo_url:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  dtos.CustomerSearchRequest:
    description: Pagination plus optional search text and is_active filter.
    properties:
      is_active:
        description: Optional active filter.
        type: boolean
      order_by:
        maxLength: 50
        type: string
      page:
        minimum: 1
        type: integer
      page_size:
        maximum: 100
        minimum: 1
        type: integer
      search:
        description: Optional text search over first and last name.
        type: string
      sort_direction:
        allOf:
        - $ref: '#/definitions/page.SortDirection'
        enum:
        - ASC
        - DESC
    type: object
  dtos.CustomerUpdateRequest:
    description: ID (required) plus optional fields to update. ID can also be taken
      from URL path.
    properties:
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        enum:
        - male
        - female
        - not_specified
        - other
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      photo_url:
        type: string
      user_id:
        type: integer
    required:
    - id
    type: object
  dtos.EmployeeCreateRequest:
    description: Name, gender, date of birth, photo, license number, years experience,
      specialty, schedule, optional is_active.
    properties:
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        enum:
        - male
        - female
        - not_specified
        - other
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      license_number:
        type: string
      photo:
        type: string
      schedule:
        $ref: '#/definitions/dtos.EmployeeScheduleRequest'
      specialty:
        type: string
      years_experience:
        maximum: 60
        minimum: 0
        type: integer
    required:
    - date_of_birth
    - first_name
    - gender
    - last_name
    - license_number
    - schedule
    - specialty
    type: object
  dtos.EmployeeResponse:
    description: 'Employee entity: id, name, gender, date of birth, photo, license,
      specialty, years experience, is_active, user_id, timestamps.'
    properties:
      created_at:
        type: string
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      license_number:
        type: string
      photo:
        type: string
      specialty:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
      years_experience:
        type: integer
    type: object
  dtos.EmployeeScheduleRequest:
    description: Day of week, entry/departure time (0-23), optional break window.
    properties:
      day:
        description: e.g. "monday"
        type: string
      departure_time:
        maximum: 23
        minimum: 0
        type: integer
      end_break:
        maximum: 23
        minimum: 0
        type: integer
      entry_time:
        description: 0-23
        maximum: 23
        minimum: 0
        type: integer
      start_break:
        maximum: 23
        minimum: 0
        type: integer
    required:
    - day
    - departure_time
    - entry_time
    type: object
  dtos.EmployeeSearchRequest:
    description: Pagination plus optional specialty and is_active filter.
    properties:
      is_active:
        type: boolean
      order_by:
        maxLength: 50
        type: string
      page:
        minimum: 1
        type: integer
      page_size:
        maximum: 100
        minimum: 1
        type: integer
      sort_direction:
        allOf:
        - $ref: '#/definitions/page.SortDirection'
        enum:
        - ASC
        - DESC
      specialty:
        type: string
    type: object
  dtos.EmployeeUpdateRequest:
    description: ID (required) plus optional fields and optional schedule.
    properties:
      date_of_birth:
        type: string
      first_name:
        type: string
      gender:
        enum:
        - male
        - female
        - not_specified
        - other
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_name:
        type: string
      license_number:
        type: string
      photo:
        type: string
      schedule:
        $ref: '#/definitions/dtos.EmployeeScheduleRequest'
      specialty:
        type: string
      years_experience:
        maximum: 60
        minimum: 0
        type: integer
    required:
    - id
    type: object
  dtos.EnableTwoFactorRequest:
    description: '2FA method: totp, sms, or email.'
    properties:
      method:
        enum:
        - totp
        - sms
        - email
        type: string
    required:
    - method
    type: object
  dtos.LoginRequest:
    description: Email, password, and optional two_factor_code when 2FA is enabled.
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 128
        type: string
      two_factor_code:
        maxLength: 16
        type: string
    required:
    - email
    - password
    type: object
  dtos.LogoutRequest:
    description: Refresh token to revoke for the current session.
    properties:
      refresh_token:
        maxLength: 2000
        type: string
    required:
    - refresh_token
    type: object
  dtos.PaymentResponse:
    description: 'Payment entity: id, amount, currency, status, method, transaction_id,
      description, due_date, paid_at, customer_id, timestamps, optional refund/delete
      info.'
    properties:
      amount:
        type: number
      created_at:
        type: string
      currency:
        type: string
      customer_id:
        type: integer
      deleted_at:
        type: string
      description:
        type: string
      due_date:
        type: string
      failure_reason:
        type: string
      id:
        type: integer
      invoice_id:
        type: string
      is_active:
        type: boolean
      method:
        type: string
      method_display:
        type: string
      paid_at:
        type: string
      refund_amount:
        type: number
      refunded_at:
        type: string
      status:
        type: string
      status_display:
        type: string
      transaction_id:
        type: string
      updated_at:
        type: string
    type: object
  dtos.ProfileInfo:
    description: User profile details
    properties:
      bio:
        description: User biography (max 500 characters)
        example: Animal lover and pet owner
        maxLength: 500
        type: string
      date_of_birth:
        description: Date of birth
        example: "1990-01-15T00:00:00Z"
        type: string
      gender:
        description: Gender of the user
        example: male
        type: string
      name:
        description: Full name of the user
        example: John Doe
        type: string
      photo_url:
        description: URL to user's profile photo
        example: https://example.com/photo.jpg
        type: string
    type: object
  dtos.ProfileResponse:
    description: 'Authenticated user''s profile: id, email, phone, role, status, name,
      gender, date of birth, profile picture URL, bio.'
    properties:
      bio:
        type: string
      date_of_birth:
        type: string
      email:
        type: string
      gender:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      profile_pic_url:
        type: string
      role:
        type: string
      status:
        type: string
    type: object
  dtos.RefreshTokenRequest:
    description: Refresh token string to exchange for new access and refresh tokens.
    properties:
      refresh_token:
        maxLength: 2000
        type: string
    required:
    - refresh_token
    type: object
  dtos.RegisterRequest:
    description: 'Request body for user registration. Role: admin, veterinarian, customer,
      or receptionist. Admins get immediate access; others may require activation.'
    properties:
      bio:
        maxLength: 500
        type: string
      date_of_birth:
        maxLength: 20
        type: string
      email:
        example: user@example.com
        maxLength: 255
        type: string
      employee_id:
        type: integer
      gender:
        maxLength: 20
        type: string
      license_number:
        maxLength: 100
        type: string
      name:
        maxLength: 200
        type: string
      password:
        example: SecurePass123!
        maxLength: 128
        minLength: 8
        type: string
      phone_number:
        maxLength: 30
        type: string
      photo_url:
        maxLength: 500
        type: string
      role:
        enum:
        - admin
        - veterinarian
        - customer
        - receptionist
        example: customer
        type: string
    required:
    - email
    - password
    - role
    type: object
  dtos.RequestResetPasswordRequest:
    description: Email address to send the password reset link/code to.
    properties:
      email:
        maxLength: 255
        type: string
    required:
    - email
    type: object
  dtos.ResetPasswordRequest:
    description: Email, code received by email, and new password.
    properties:
      code:
        maxLength: 32
        type: string
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - code
    - email
    - password
    type: object
  dtos.UpdateProfileRequest:
    description: Authenticated user's profile fields to update (name, gender, date
      of birth, photo URL, bio).
    properties:
      bio:
        maxLength: 500
        type: string
      date_of_birth:
        type: string
      gender:
        example: male
        type: string
      name:
        example: John Doe
        type: string
      photo_url:
        type: string
    required:
    - gender
    - name
    type: object
  dtos.UserResponse:
    description: User account information (excluding sensitive data)
    properties:
      created_at:
        description: |-
          Account creation timestamp
          Example: 2024-01-01T00:00:00Z
        example: "2024-01-01T00:00:00Z"
        type: string
      customer_id:
        description: |-
          ID of the associated customer (for customer users)
          Example: 789
        example: 789
        type: integer
      email:
        description: |-
          Email address of the user
          Example: user@example.com
        example: user@example.com
        type: string
      email_verified:
        description: |-
          Whether the email has been verified
          Example: true
        example: true
        type: boolean
      employee_id:
        description: |-
          ID of the associated employee (for staff users)
          Example: 456
        example: 456
        type: integer
      id:
        description: |-
          Unique identifier for the user
          Example: 123
        example: 123
        type: integer
      last_login_at:
        description: |-
          Last login timestamp
          Example: 2024-03-10T15:30:00Z
        example: "2024-03-10T15:30:00Z"
        type: string
      oauth_provider:
        description: |-
          OAuth provider name (e.g., "google", "facebook")
          Example: google
        example: google
        type: string
      phone_number:
        description: |-
          Phone number of the user
          Example: +1234567890
        example: "+1234567890"
        type: string
      profile:
        allOf:
        - $ref: '#/definitions/dtos.ProfileResponse'
        description: User profile information
      role:
        description: |-
          Role of the user (admin, veterinarian, customer, receptionist)
          Example: customer
        example: customer
        type: string
      status:
        description: |-
          Status of the user account (active, inactive, banned, pending)
          Example: active
        example: active
        type: string
      two_factor_enabled:
        description: |-
          Whether two-factor authentication is enabled
          Example: false
        example: false
        type: boolean
      updated_at:
        description: |-
          Last update timestamp
          Example: 2024-03-10T15:30:00Z
        example: "2024-03-10T15:30:00Z"
        type: string
    type: object
  dtos.VerifyTwoFactorRequest:
    description: One-time 2FA code (TOTP or backup code).
    properties:
      two_factor_code:
        maxLength: 16
        type: string
    required:
    - two_factor_code
    type: object
  http.APIResponse:
    description: Standardized API response structure.
    properties:
      data:
        description: The data payload of the response for successful requests.
      error:
        allOf:
        - $ref: '#/definitions/http.ErrorInfo'
        description: Details of the error if the request was not successful.
      message:
        description: A message providing additional context about the response.
        type: string
      meta:
        description: Additional metadata for the response, such as pagination info.
      request_id:
        description: A unique identifier for the request.
        type: string
      success:
        description: Indicates whether the request was successful.
        type: boolean
      timestamp:
        description: The timestamp when the response was generated.
        type: string
    type: object
  http.ErrorInfo:
    description: Detailed information about an error.
    properties:
      code:
        description: The error code.
        type: string
      details:
        additionalProperties:
          type: string
        description: A map of specific error details, often used for validation errors.
        type: object
      message:
        description: A descriptive error message.
        type: string
      stack:
        description: The error stack trace (for development purposes).
        type: string
      type:
        description: The type of the error.
        type: string
    type: object
  page.SortDirection:
    enum:
    - ASC
    - DESC
    type: string
    x-enum-comments:
      ASC: Ascending order
      DESC: Descending order
    x-enum-descriptions:
    - Ascending order
    - Descending order
    x-enum-varnames:
    - ASC
    - DESC
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: Equipo de Soporte API
    url: http://www.swagger.io/support
  description: 'API REST para la gestión de la clínica veterinaria: autenticación,
    usuarios, clientes, empleados, mascotas, citas, pagos y notificaciones.'
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: API Clínica Veterinaria
  version: "2.0"
paths:
  /appointments:
    get:
      consumes:
      - application/json
      description: Paginated search of all appointments with filters. Requires admin
        or manager role.
      parameters:
      - description: Search criteria and pagination
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dtos.AppointmentSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Paginated appointments
          schema:
            $ref: '#/definitions/http.APIResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http.APIResponse'
      security:
      - BearerAuth: []
      summary: Search appointments (manager/admin)
      tags:
      - appointments
  /auth/2fa/disable:
    post:
      consumes:
      - application/json
      description: Disables 2FA for the authenticated user. Requires Bearer auth.
      produces:
      - application/json
      responses:
        "200":
          description: 2FA disabled
          schema:
            $ref: '#/definitions/http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http.APIResponse'
      security:
      - BearerAuth: []
      summary: Disable two-factor authentication
      tags:
      - auth
  /auth/2fa/enable:
    post:
      consumes:
      - application/json
      description: 'Enables 2FA for the authenticated user (method: totp, sms, or
        email). Requires Bearer auth.'
      parameters:
      - description: 2FA method
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dtos.EnableTwoFactorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 2FA enabled
          schema:
            $ref: '#/definitions/http.APIResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http.APIResponse'
      security:
      - BearerAuth: []
      summary: Enable two-factor authentication
      tags:
      - auth
  /auth/2fa/verify:
    post:
      consumes:
      - application/json
      description: Completes login by verifying the two-factor code. Returns new session
        payload. Requires Bearer auth.
      parameters:
      - description: 2FA code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dtos.VerifyTwoFactorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Session with tokens
          schema:
            $ref: '#/definitions/http.APIResponse'
        "400":
          description: Invalid code
          schema:
            $ref: '#/definitions/http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http.APIResponse'
      security:
      - BearerAuth: []
      summary: Verify 2FA code
      tags:
      - auth
  /auth/activate:
    post:
      consumes:
      - application/json
      description: Activates a user account using the user ID and activation code
        (e.g. from email link). Supports query params or JSON body.
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: string
      - description: Activation code
        in: query
        name: code
        required: true
        type: string
      - description: 'Alternative: JSON body with user_id and code'
        in: body
        name: body
        schema:
          $ref: '#/definitions/dtos.ActivateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account activated
          schema:
            $ref: '#/definitions/http.APIResponse'
        "400":
          description: Invalid or missing parameters
          schema:
            $ref: '#/definitions/http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http.APIResponse'
      summary: Activate account
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates with email and password. Returns access and refresh
        tokens. If 2FA is enabled, may return requires_two_factor with user_id.
      parameters:
      - description: Email and password; optional two_factor_code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dtos.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful (session payload with tokens and user)
          schema:
            $ref: '#/definitions/http.APIResponse'
        "400":
          description: Invalid credentials or validation error
          schema:
            $ref: '#/definitions/http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http.APIResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidates the current session (refresh token). Requires Bearer
        auth.
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dtos.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            $ref: '#/definitions/http.APIResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http.APIResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/logout-all:
    post:
      consumes:
      - application/json
      description: Invalidates all refresh tokens for the authenticated user. Requires
