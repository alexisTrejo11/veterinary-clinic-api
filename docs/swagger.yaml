      - application/json
      description: Updates general info (reason, notes, service) of an appointment.
        Requires admin or manager role.
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentUpdateGeneralInfoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Appointment updated
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "404":
          description: Appointment not found
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
      security:
      - BearerAuth: []
      summary: Update appointment (manager/admin)
      tags:
      - appointments
  /appointments/{id}/cancel:
