      consumes:
      - application/json
      description: Deletes an appointment. Soft-delete by default; pass hard=true
        for permanent deletion. Requires admin or manager role.
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: integer
      - default: false
        description: Hard delete (permanent)
        in: query
        name: hard
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Appointment deleted
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "404":
          description: Appointment not found
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete appointment (manager/admin)
      tags:
      - appointments
    get:
      consumes:
      - application/json
      description: Returns a single appointment by ID. Requires admin or manager role.
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Appointment found
          schema:
            allOf:
            - $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentResponse'
              type: object
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "404":
          description: Appointment not found
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
      security:
      - BearerAuth: []
      summary: Get appointment by ID (manager/admin)
      tags:
      - appointments
