      - application/json
      responses:
        "200":
          description: Paginated appointments
          schema:
            allOf:
            - $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentResponse'
                  type: array
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
      security:
      - BearerAuth: []
      summary: Search appointments (manager/admin)
      tags:
      - appointments
    post:
      consumes:
      - application/json
      description: Creates a new appointment, optionally assigned to an employee via
        query param. Requires admin or manager role.
      parameters:
      - description: Employee ID to assign
        in: query
        name: employee_id
        type: integer
      - description: Appointment data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clinic-vet-api_internal_infrastructure_http_handlers_dtos.AppointmentCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Appointment created (data contains new appointment ID)
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
      security:
      - BearerAuth: []
      summary: Create appointment (manager/admin)
      tags:
      - appointments
  /appointments/{id}:
