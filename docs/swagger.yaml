        "404":
          description: Appointment not found
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/clinic-vet-api_internal_shared_http.APIResponse'
      security:
      - BearerAuth: []
      summary: Cancel appointment (manager/admin)
      tags:
      - appointments
  /appointments/{id}/complete:
    post:
      consumes:
      - application/json
      description: Marks an appointment as completed, with optional employee and notes.
        Requires admin or manager role.
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Employee ID
        in: query
        name: employee_id
        type: integer
      - description: Completion notes
        in: query
        name: notes
        type: string
      produces:
      - application/json
      responses:
        "200":
