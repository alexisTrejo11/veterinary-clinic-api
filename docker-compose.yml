name: clinic-vet-api

# Two profiles:
#   default -> just the API (standalone). Uses DATABASE_URL / REDIS_URL from .env
#              as-is, so it talks to any external Postgres/Redis (localhost, RDS,
#              Upstash, ElastiCache, ...).
#   full    -> API + bundled Postgres + Redis. The API overrides DATABASE_URL and
#              REDIS_URL to target the in-network service names.
#
# Usage:
#   docker compose up --build                 # default profile (see COMPOSE_PROFILES in .env)
#   docker compose --profile full up --build  # full stack

# Shared API service config, reused by both the standalone and full-stack variants.
x-api-base: &api-base
  build:
    context: .
    dockerfile: Dockerfile
  image: clinic-vet-api:latest
  env_file:
    - .env
  ports:
    - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
  restart: unless-stopped
  networks:
    - vet_network

services:
  # --- default profile: standalone app against external URLs ---
  api:
    <<: *api-base
    container_name: clinic_vet_api
    profiles: [default]

  # --- full profile: same app, but pointed at the bundled Postgres/Redis ---
  api-full:
    <<: *api-base
    container_name: clinic_vet_api
    profiles: [full]
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-vet_database}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-vetredis}@redis:6379/${REDIS_DB:-0}
      # Bundled DB is fresh, so run migrations and wait for it to be ready.
      SKIP_MIGRATIONS: "false"
      SKIP_DB_WAIT: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: clinic_vet_postgres
    profiles: [full]
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-vet_database}
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5431}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-vet_database}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - vet_network

  redis:
    image: redis:7-alpine
    container_name: clinic_vet_redis
    profiles: [full]
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-vetredis}"]
    ports:
      - "${REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-vetredis} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - vet_network

networks:
  vet_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
